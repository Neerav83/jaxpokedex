name: Build Android APK

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-on-server:
    name: Build on self-hosted server
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release APK
        run: bash scripts/server-build.sh

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaxpokedex-apk-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload versioned APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: jaxpokedex-apk-versioned
          path: build/app/outputs/flutter-apk/jaxpokedex-*.apk
          retention-days: 30
          if-no-files-found: ignore
