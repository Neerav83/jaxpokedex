# Alternativ om du inte vill köra en self-hosted runner.
# Aktivera genom att lägga till secrets i GitHub:
#   SERVER_HOST, SERVER_USER, SERVER_SSH_KEY, SERVER_DEPLOY_PATH
#
# Byt namn på filen till deploy-ssh.yml (utan .disabled) för att aktivera,
# eller kopiera jobbet till build-android.yml.

name: Deploy and build via SSH

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Build on server over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.SERVER_DEPLOY_PATH }}"
            git fetch origin
            git reset --hard origin/master
            bash scripts/server-build.sh
